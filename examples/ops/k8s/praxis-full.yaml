# praxis-full.yaml — Raw Kubernetes manifests for Praxis (without Restate).
#
# These manifests deploy Praxis Core and all driver packs as independent
# Deployments. Restate is NOT included — you must point these services at
# an existing Restate instance (self-hosted or Restate Cloud).
#
# For most deployments, the Helm chart is recommended instead:
#
#   helm install praxis charts/praxis \
#     --namespace praxis-system --create-namespace
#
# These raw manifests exist for environments where Helm is not available.
#
# Topology:
#   praxis-core (Deployment) — command service, orchestrator, templates
#   praxis-storage (Deployment) — S3, EBS, RDS, Aurora, SNS, SQS drivers
#   praxis-compute (Deployment) — AMI, KeyPair, EC2, Lambda, ECR drivers
#   praxis-network (Deployment) — VPC, SG, IGW, NACL, Subnet, NAT, Route 53, ELB, ACM drivers
#   praxis-identity (Deployment) — IAM Role, Policy, User, Group, Instance Profile drivers
#   praxis-monitoring (Deployment) — CloudWatch Log Group, Metric Alarm, Dashboard drivers
#   praxis-notifications (Deployment) — Notification routing service
#
# Quick start:
#   1. Edit the ConfigMap below with your AWS credentials and Restate endpoint.
#   2. kubectl apply -f examples/ops/k8s/praxis-full.yaml
#   3. Register services with Restate:
#      for svc in praxis-core praxis-storage praxis-compute praxis-network \
#                 praxis-identity praxis-monitoring praxis-notifications; do
#        curl -X POST http://<RESTATE_ADMIN>:9070/deployments \
#          -H 'content-type: application/json' \
#          -d "{\"uri\": \"http://${svc}.praxis-system:9080\", \"force\": true}"
#      done

# ═══════════════════════════════════════════════════════════════════════════════
# NAMESPACE
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Namespace
metadata:
  name: praxis-system
  labels:
    app.kubernetes.io/part-of: praxis

---

# ═══════════════════════════════════════════════════════════════════════════════
# CONFIGMAP — shared environment for all Praxis services
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: ConfigMap
metadata:
  name: praxis-config
  namespace: praxis-system
  labels:
    app.kubernetes.io/part-of: praxis
data:
  # Restate endpoint — REQUIRED. Set this to your Restate ingress URL
  # (self-hosted or Restate Cloud).
  PRAXIS_RESTATE_ENDPOINT: "http://restate:8080"

  # AWS credentials / region — replace with real values or use IAM Roles for
  # Service Accounts (IRSA) in production.
  AWS_REGION: "us-east-1"
  AWS_DEFAULT_REGION: "us-east-1"
  AWS_ACCESS_KEY_ID: "REPLACE_ME"
  AWS_SECRET_ACCESS_KEY: "REPLACE_ME"

---

# ═══════════════════════════════════════════════════════════════════════════════
# PRAXIS CORE — command service, orchestrator, template engine
# ═══════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: praxis-core
  namespace: praxis-system
  labels:
    app.kubernetes.io/name: praxis-core
    app.kubernetes.io/part-of: praxis
    app.kubernetes.io/component: core
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: praxis-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: praxis-core
        app.kubernetes.io/part-of: praxis
        app.kubernetes.io/component: core
    spec:
      containers:
        - name: praxis-core
          image: ghcr.io/shirvan/praxis-core:latest
          ports:
            - name: restate
              containerPort: 9080
          envFrom:
            - configMapRef:
                name: praxis-config
          env:
            - name: PRAXIS_LISTEN_ADDR
              value: "0.0.0.0:9080"
            - name: PRAXIS_SCHEMA_DIR
              value: "/schemas"
          readinessProbe:
            tcpSocket:
              port: restate
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi

---

apiVersion: v1
kind: Service
metadata:
  name: praxis-core
  namespace: praxis-system
  labels:
    app.kubernetes.io/name: praxis-core
    app.kubernetes.io/part-of: praxis
spec:
  selector:
    app.kubernetes.io/name: praxis-core
  ports:
    - name: restate
      port: 9080
      targetPort: restate

---

