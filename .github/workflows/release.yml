# Manual release workflow — triggered by pushing a semver tag (e.g. v0.1.0).
#
# Workflow:
#   1. Developer runs `just release v0.1.0` locally (creates + pushes tag)
#   2. This workflow runs: lint → test → build artifacts → create GitHub Release
#   3. Developer edits the release on GitHub to add release notes
#
# Semver convention:
#   Major — big architecture changes (shared, post-1.0.0)
#   Minor — driver-level releases / new features
#   Patch — hotfixes and patches

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
          just lint

      - name: Unit tests
        run: just test

      - name: Build release artifacts
        run: just release-build ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            dist/${{ steps.version.outputs.version }}/praxis_darwin_arm64.tar.gz
            dist/${{ steps.version.outputs.version }}/praxis_darwin_amd64.tar.gz
            dist/${{ steps.version.outputs.version }}/praxis_linux_amd64.tar.gz
            dist/${{ steps.version.outputs.version }}/checksums.txt

  docker:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - name: praxis-core
            dockerfile: cmd/praxis-core/Dockerfile
          - name: praxis-storage
            dockerfile: cmd/praxis-storage/Dockerfile
          - name: praxis-network
            dockerfile: cmd/praxis-network/Dockerfile
          - name: praxis-compute
            dockerfile: cmd/praxis-compute/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:latest
