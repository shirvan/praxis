# Owner-dispatched publication of the one mutable Praxis alpha contract.
# A normal branch push or tag push cannot publish artifacts.

name: Release alpha

on:
  workflow_dispatch:

concurrency:
  group: release-alpha
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Start and seed Moto
        run: |
          docker compose up -d moto
          docker compose up --exit-code-from moto-init moto-init

      - name: Integration tests
        run: just test-integration-release
        env:
          PRAXIS_INTEGRATION_TIMEOUT: 60m

  artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Check formatting
        run: just fmt-check

      - name: Unit tests
        run: just test

      - name: Build and verify alpha artifacts
        run: just release-verify

      - name: Upload alpha artifacts
        uses: actions/upload-artifact@v4
        with:
          name: praxis-alpha
          path: dist/alpha/*
          if-no-files-found: error
          retention-days: 7

  production-topology:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Prepare production process topology
        run: |
          cp .env.example .env
          docker compose build
          docker compose up -d
          just wait-stack
          just register
          just build-cli

      - name: Compiled CLI acceptance test
        run: just test-production-topology

      - name: Capture service logs
        if: failure()
        run: docker compose logs --no-color

      - name: Stop topology
        if: always()
        run: docker compose down -v

  build-images:
    needs: [integration, artifacts, production-topology]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: praxis-core
            target: praxis-core
          - name: praxis-storage
            target: praxis-storage
          - name: praxis-network
            target: praxis-network
          - name: praxis-compute
            target: praxis-compute
          - name: praxis-identity
            target: praxis-identity
          - name: praxis-monitoring
            target: praxis-monitoring
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image without publishing
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.image.target }}
          push: false
          build-args: |
            PRAXIS_VERSION=alpha
            PRAXIS_REVISION=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.target }}

  publish-images:
    needs: build-images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: praxis-core
            target: praxis-core
          - name: praxis-storage
            target: praxis-storage
          - name: praxis-network
            target: praxis-network
          - name: praxis-compute
            target: praxis-compute
          - name: praxis-identity
            target: praxis-identity
          - name: praxis-monitoring
            target: praxis-monitoring
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish alpha image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.image.target }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:alpha
          build-args: |
            PRAXIS_VERSION=alpha
            PRAXIS_REVISION=${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image.target }}

  release:
    needs: [artifacts, publish-images]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download alpha artifacts
        uses: actions/download-artifact@v4
        with:
          name: praxis-alpha
          path: dist/alpha

      - name: Advance the mutable alpha tag
        run: |
          git tag --force alpha "$GITHUB_SHA"
          git push --force origin refs/tags/alpha

      - name: Create or update the alpha release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: alpha
          name: Praxis alpha
          prerelease: true
          make_latest: false
          generate_release_notes: false
          body_path: .github/RELEASE_ALPHA.md
          fail_on_unmatched_files: true
          preserve_order: true
          files: dist/alpha/*
