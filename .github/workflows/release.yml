# Manual release workflow — triggered by pushing a semver tag (e.g. v0.1.0).
#
# Workflow:
#   1. Developer runs `just release v0.1.0` locally (creates + pushes tag)
#   2. This workflow runs: lint → test → build artifacts → create GitHub Release
#   3. Developer edits the release on GitHub to add release notes
#
# Semver convention:
#   Major — big architecture changes (shared, post-1.0.0)
#   Minor — driver-level releases / new features
#   Patch — hotfixes and patches

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Releases are gated on the full Moto-backed integration suite — the unit
  # suite alone proves very little about actual provisioning behavior.
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Start and seed Moto
        run: |
          docker compose up -d moto
          docker compose up --exit-code-from moto-init moto-init

      - name: Integration tests
        run: just test-integration
        env:
          PRAXIS_INTEGRATION_TIMEOUT: 40m

  release:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          just lint

      - name: Unit tests
        run: just test

      - name: Build release artifacts
        run: just release-build ${{ steps.version.outputs.version }}

      - name: Detect prerelease
        id: prerelease
        run: |
          if echo "${GITHUB_REF_NAME}" | grep -qE '\-(alpha|beta|rc)'; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract release notes from tag
        id: notes
        run: |
          # actions/checkout converts annotated tags into lightweight ones
          # (actions/checkout#290), so re-fetch the real tag object first.
          git fetch --force origin "refs/tags/${GITHUB_REF_NAME}:refs/tags/${GITHUB_REF_NAME}"
          # Get tag message body (skip the first "title" line)
          BODY=$(git tag -l --format='%(contents:body)' "${GITHUB_REF_NAME}")
          SUBJECT=$(git tag -l --format='%(contents:subject)' "${GITHUB_REF_NAME}")
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "${SUBJECT}"
            echo ""
            echo "${BODY}"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          draft: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          body: ${{ steps.notes.outputs.body }}
          files: |
            dist/${{ steps.version.outputs.version }}/praxis_darwin_arm64.tar.gz
            dist/${{ steps.version.outputs.version }}/praxis_darwin_amd64.tar.gz
            dist/${{ steps.version.outputs.version }}/praxis_linux_amd64.tar.gz
            dist/${{ steps.version.outputs.version }}/checksums.txt

  docker:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - name: praxis-core
            target: praxis-core
          - name: praxis-storage
            target: praxis-storage
          - name: praxis-network
            target: praxis-network
          - name: praxis-compute
            target: praxis-compute
          - name: praxis-identity
            target: praxis-identity
          - name: praxis-monitoring
            target: praxis-monitoring
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.image.target }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image.name }}:latest

  helm:
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Stamp chart version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.version.outputs.version }}/" charts/praxis/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.version.outputs.version }}\"/" charts/praxis/Chart.yaml
          cat charts/praxis/Chart.yaml

      - name: Package Helm chart
        run: |
          mkdir -p dist/helm
          helm package charts/praxis --destination dist/helm

      - name: Push chart to GHCR
        run: helm push dist/helm/praxis-${{ steps.version.outputs.version }}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts

      - name: Upload chart to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/helm/praxis-${{ steps.version.outputs.version }}.tgz
