# CI workflow — runs on every push and pull request to main.
# Uses `just` for all steps to stay consistent with local development.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref so a fast-follow push doesn't leave a
# stale ~40-minute integration job running to completion.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      # golangci-lint-action caches the linter binary and analysis cache,
      # avoiding a from-source compile on every run.
      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: Check formatting
        run: just fmt-check

      - name: Unit tests
        run: just test

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

      - name: Build
        run: just build

      # Generated JSON Schemas under schemas/events/gen must match their CUE
      # sources; drift means someone edited one side without the other. Uses the
      # same just recipe as `just ci` so local and CI can't disagree.
      - name: Event schema generation drift
        run: |
          # Keep the generator aligned with go.mod. CUE's JSON Schema output can
          # change between releases even when the source schema does not.
          go install cuelang.org/go/cmd/cue@v0.16.0
          just check-schema-drift

      - name: Helm chart lint
        run: |
          helm lint charts/praxis
          helm template charts/praxis > /dev/null

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      # The integration suite expects Moto (mock AWS) on localhost:4566,
      # seeded with the SSM parameters and default VPC from moto-init.
      # Restate itself is started per-test by Testcontainers.
      - name: Start and seed Moto
        run: |
          docker compose up -d moto
          docker compose up --exit-code-from moto-init moto-init

      - name: Integration tests
        run: just test-integration
        env:
          PRAXIS_INTEGRATION_TIMEOUT: 60m
