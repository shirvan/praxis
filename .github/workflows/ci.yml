# CI workflow — runs on every push and pull request to main.
# Uses `just` for all steps to stay consistent with local development.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          just lint

      - name: Check formatting
        run: just fmt-check

      - name: Unit tests
        run: just test

      - name: Build
        run: just build

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install just
        uses: extractions/setup-just@v2

      # The integration suite expects Moto (mock AWS) on localhost:4566,
      # seeded with the SSM parameters and default VPC from moto-init.
      # Restate itself is started per-test by Testcontainers.
      - name: Start and seed Moto
        run: |
          docker compose up -d moto
          docker compose up --exit-code-from moto-init moto-init

      - name: Integration tests
        run: just test-integration
        env:
          PRAXIS_INTEGRATION_TIMEOUT: 40m
