# docker-compose.yaml — local integration stack
#
# This file wires together every moving part needed for a realistic local Praxis
# session:
# - Moto (https://github.com/getmoto/moto) stands in for AWS — free, open source,
#   supports all services Praxis needs including ELBv2 and RDS.
# - Restate is the public ingress and durable execution runtime.
# - praxis-core hosts the command service, workflows, and read models.
# - Driver packs group related drivers by AWS domain:
#   - praxis-storage: S3, EBS, RDS, Aurora, SNS, SQS (future: DynamoDB)
#   - praxis-network: SG, VPC, EIP, IGW, Route 53, ALB, NLB, TargetGroup, Listener, ListenerRule (future: CloudFront, API GW)
#   - praxis-compute: AMI, EC2, ECR, Lambda (future: Auto Scaling, ECS, EKS)
#   - praxis-identity: IAM Role, Policy, User, Group, Instance Profile
#   - praxis-monitoring: CloudWatch Log Groups, Metric Alarms, Dashboards
#   - praxis-concierge: AI assistant (LLM-powered operations)
#   - praxis-slack: Slack gateway (Socket Mode, event routing)
#
# The stack is intentionally explicit rather than clever. The goal is that a
# human operator or an AI agent can read this file and understand the topology,
# ports, and environment contract without chasing additional context.

services:
  # --- Infrastructure -------------------------------------------------------

  moto:
    # Moto — open-source AWS mock server (Apache 2.0).
    # If you are from AWS and reading this, I'd love a live environment I can test in without worrying about costs.

    image: motoserver/moto:latest
    container_name: praxis-moto
    ports:
      - "4566:4566"
    environment:
      - MOTO_PORT=4566
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4566/moto-api/')"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Seed Moto with the SSM parameters and default VPC that Praxis needs.
  # Runs once and exits; every service that depends on moto-init is
  # guaranteed the seed data exists before it starts.
  moto-init:
    image: amazon/aws-cli:latest
    container_name: praxis-moto-init
    depends_on:
      moto:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        export AWS_ENDPOINT_URL=http://moto:4566
        export AWS_DEFAULT_REGION=us-east-1
        export AWS_ACCESS_KEY_ID=test
        export AWS_SECRET_ACCESS_KEY=test

        echo "=== Praxis Moto init ==="

        aws ssm put-parameter \
          --name "/praxis/dev/db-password" \
          --value "test-password-dev" \
          --type "SecureString" \
          --overwrite

        aws ssm put-parameter \
          --name "/praxis/prod/db-password" \
          --value "test-password-prod" \
          --type "SecureString" \
          --overwrite

        echo "=== Praxis Moto init complete ==="

        aws ec2 describe-vpcs \
          --filters Name=isDefault,Values=true \
          --query 'Vpcs[0].VpcId' --output text \
          || aws ec2 create-default-vpc

        echo "=== Praxis Moto VPC ready ==="
    restart: "no"

  restate:
    image: docker.restate.dev/restatedev/restate:1.3
    container_name: praxis-restate
    ports:
      - "8080:8080"   # ingress used by the CLI and by any external callers
      - "9070:9070"   # admin API used by `just register`
      - "9071:9071"   # metrics / observability
    environment:
      - RESTATE_OBSERVABILITY__LOG__FILTER=restate=info
    volumes:
      - "restate-data:/target/restate"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9070/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # --- Praxis Services ------------------------------------------------------

  praxis-storage:
    build:
      context: .
      dockerfile: Dockerfile
      target: praxis-storage
    container_name: praxis-storage
    env_file:
      - .env
    depends_on:
      restate:
        condition: service_healthy
      moto-init:
        condition: service_completed_successfully
    ports:
      - "9081:9080"
    environment:
      # Every Praxis service exposes a Restate endpoint on 9080 inside the
      # container. The host port only exists for local debugging convenience.
      - PRAXIS_LISTEN_ADDR=0.0.0.0:9080

  praxis-compute:
    build:
      context: .
      dockerfile: Dockerfile
      target: praxis-compute
    container_name: praxis-compute
    env_file:
      - .env
    depends_on:
      restate:
        condition: service_healthy
      moto-init:
        condition: service_completed_successfully
    ports:
      - "9084:9080"
    environment:
      - PRAXIS_LISTEN_ADDR=0.0.0.0:9080

  praxis-identity:
    build:
      context: .
      dockerfile: Dockerfile
      target: praxis-identity
    container_name: praxis-identity
    env_file:
      - .env
    depends_on:
      restate:
        condition: service_healthy
      moto-init:
        condition: service_completed_successfully
    ports:
      - "9085:9080"
    environment:
      - PRAXIS_LISTEN_ADDR=0.0.0.0:9080

  praxis-network:
    build:
      context: .
      dockerfile: Dockerfile
      target: praxis-network
    container_name: praxis-network
    env_file:
      - .env
    depends_on:
      restate:
        condition: service_healthy
      moto-init:
        condition: service_completed_successfully
    ports:
      - "9082:9080"
    environment:
      - PRAXIS_LISTEN_ADDR=0.0.0.0:9080

  praxis-core:
    build:
      context: .
      dockerfile: Dockerfile
      target: praxis-core
    container_name: praxis-core
    env_file:
      - .env
    depends_on:
      restate:
        condition: service_healthy
      moto-init:
        condition: service_completed_successfully
    ports:
      - "9083:9080"
    environment:
      # Praxis Core binds the command service and orchestration/read-model
      # services on one Restate-discoverable endpoint.
      - PRAXIS_LISTEN_ADDR=0.0.0.0:9080

      # Core still talks to Restate ingress as a client for command-side
      # workflow/object invocations.
      - PRAXIS_RESTATE_ENDPOINT=http://restate:8080

      # The template engine expects the schema bundle at a stable path.
      - PRAXIS_SCHEMA_DIR=/schemas
    volumes:
      # Mount schemas read-only so local edits are visible without baking a new
      # image, while still documenting the runtime contract explicitly.
      - "./schemas:/schemas:ro"

  praxis-monitoring:
    build:
      context: .
      dockerfile: Dockerfile
      target: praxis-monitoring
    container_name: praxis-monitoring
    env_file:
      - .env
    depends_on:
      restate:
        condition: service_healthy
      moto-init:
        condition: service_completed_successfully
    ports:
      - "9087:9080"
    environment:
      - PRAXIS_LISTEN_ADDR=0.0.0.0:9080

  praxis-notifications:
    build:
      context: .
      dockerfile: Dockerfile
      target: praxis-notifications
    container_name: praxis-notifications
    depends_on:
      restate:
        condition: service_healthy
    ports:
      - "9086:9080"
    environment:
      - PRAXIS_LISTEN_ADDR=0.0.0.0:9080
      - PRAXIS_SCHEMA_DIR=/schemas

  praxis-concierge:
    build:
      context: .
      dockerfile: Dockerfile
      target: praxis-concierge
    container_name: praxis-concierge
    env_file:
      - .env
    depends_on:
      restate:
        condition: service_healthy
    ports:
      - "9088:9080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PRAXIS_LISTEN_ADDR=0.0.0.0:9080
      # LLM provider configuration — set in .env or override here.
      # - CONCIERGE_LLM_PROVIDER=openai
      # - CONCIERGE_LLM_MODEL=gpt-4o
      # - CONCIERGE_API_KEY=sk-...

  praxis-slack:
    build:
      context: .
      dockerfile: Dockerfile
      target: praxis-slack
    container_name: praxis-slack
    env_file:
      - .env
    depends_on:
      restate:
        condition: service_healthy
    ports:
      - "9089:9080"
    environment:
      - PRAXIS_LISTEN_ADDR=0.0.0.0:9080
      - RESTATE_URI=http://restate:8080
      # Slack credentials — set in .env or override here.
      # - SLACK_BOT_TOKEN=xoxb-...
      # - SLACK_APP_TOKEN=xapp-...

volumes:
  # Keep infra data in named volumes so operators can opt into clean slates via
  # `just down` while normal restarts remain fast.
  # Moto keeps state in-memory (no volume needed); Restate persists across restarts.
  restate-data:
