apiVersion: v1
kind: Service
metadata:
  name: {{ include "praxis.fullname" . }}-core
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praxis.labels" . | nindent 4 }}
    {{- include "praxis.selectorLabels" (dict "root" . "component" "core") | nindent 4 }}
spec:
  selector:
    {{- include "praxis.selectorLabels" (dict "root" . "component" "core") | nindent 4 }}
  ports:
    - name: restate
      port: 9080
      targetPort: restate
