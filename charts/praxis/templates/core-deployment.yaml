apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "praxis.fullname" . }}-core
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praxis.labels" . | nindent 4 }}
    {{- include "praxis.selectorLabels" (dict "root" . "component" "core") | nindent 4 }}
    app.kubernetes.io/component: core
spec:
  replicas: {{ .Values.core.replicas }}
  selector:
    matchLabels:
      {{- include "praxis.selectorLabels" (dict "root" . "component" "core") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "praxis.labels" . | nindent 8 }}
        {{- include "praxis.selectorLabels" (dict "root" . "component" "core") | nindent 8 }}
        app.kubernetes.io/component: core
    spec:
      {{- include "praxis.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: praxis-core
          image: {{ include "praxis.image" (dict "component" "core" "image" .Values.core.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: restate
              containerPort: 9080
          envFrom:
            - configMapRef:
                name: {{ include "praxis.fullname" . }}-config
            {{- if and (eq .Values.account.credentialSource "static") .Values.account.accessKeyId }}
            - secretRef:
                name: {{ include "praxis.fullname" . }}-credentials
            {{- end }}
          env:
            - name: PRAXIS_RESTATE_ENDPOINT
              value: {{ include "praxis.restateIngressUrl" . | quote }}
          readinessProbe:
            tcpSocket:
              port: restate
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.core.resources | nindent 12 }}
