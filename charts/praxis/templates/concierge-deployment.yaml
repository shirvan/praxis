{{- if .Values.concierge.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "praxis.fullname" . }}-concierge
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praxis.labels" . | nindent 4 }}
    {{- include "praxis.selectorLabels" (dict "root" . "component" "concierge") | nindent 4 }}
    app.kubernetes.io/component: concierge
spec:
  replicas: {{ .Values.concierge.replicas }}
  selector:
    matchLabels:
      {{- include "praxis.selectorLabels" (dict "root" . "component" "concierge") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "praxis.labels" . | nindent 8 }}
        {{- include "praxis.selectorLabels" (dict "root" . "component" "concierge") | nindent 8 }}
        app.kubernetes.io/component: concierge
    spec:
      {{- include "praxis.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: praxis-concierge
          image: {{ include "praxis.image" (dict "component" "concierge" "image" .Values.concierge.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: restate
              containerPort: 9080
          envFrom:
            - configMapRef:
                name: {{ include "praxis.fullname" . }}-config
          env:
            {{- if .Values.concierge.llm.provider }}
            - name: CONCIERGE_LLM_PROVIDER
              value: {{ .Values.concierge.llm.provider | quote }}
            {{- end }}
            {{- if .Values.concierge.llm.model }}
            - name: CONCIERGE_LLM_MODEL
              value: {{ .Values.concierge.llm.model | quote }}
            {{- end }}
            {{- if .Values.concierge.llm.apiKey }}
            - name: CONCIERGE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "praxis.fullname" . }}-credentials
                  key: CONCIERGE_API_KEY
            {{- end }}
          readinessProbe:
            tcpSocket:
              port: restate
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.concierge.resources | nindent 12 }}
{{- end }}
