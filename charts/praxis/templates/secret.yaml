{{- $hasCredentials := and (eq .Values.account.credentialSource "static") .Values.account.accessKeyId -}}
{{- $hasConciergeKey := and .Values.concierge.enabled .Values.concierge.llm.apiKey -}}
{{- if or $hasCredentials $hasConciergeKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "praxis.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praxis.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if $hasCredentials }}
  AWS_ACCESS_KEY_ID: {{ .Values.account.accessKeyId | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.account.secretAccessKey | b64enc | quote }}
  PRAXIS_ACCOUNT_ACCESS_KEY_ID: {{ .Values.account.accessKeyId | b64enc | quote }}
  PRAXIS_ACCOUNT_SECRET_ACCESS_KEY: {{ .Values.account.secretAccessKey | b64enc | quote }}
  {{- end }}
  {{- if $hasConciergeKey }}
  CONCIERGE_API_KEY: {{ .Values.concierge.llm.apiKey | b64enc | quote }}
  {{- end }}
{{- end }}
