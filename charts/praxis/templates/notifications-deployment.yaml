{{- if .Values.notifications.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "praxis.fullname" . }}-notifications
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praxis.labels" . | nindent 4 }}
    {{- include "praxis.selectorLabels" (dict "root" . "component" "notifications") | nindent 4 }}
    app.kubernetes.io/component: notifications
spec:
  replicas: {{ .Values.notifications.replicas }}
  selector:
    matchLabels:
      {{- include "praxis.selectorLabels" (dict "root" . "component" "notifications") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "praxis.labels" . | nindent 8 }}
        {{- include "praxis.selectorLabels" (dict "root" . "component" "notifications") | nindent 8 }}
        app.kubernetes.io/component: notifications
    spec:
      {{- include "praxis.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: praxis-notifications
          image: {{ include "praxis.image" (dict "component" "notifications" "image" .Values.notifications.image "global" .Values.global) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - name: restate
              containerPort: 9080
          envFrom:
            - configMapRef:
                name: {{ include "praxis.fullname" . }}-config
          readinessProbe:
            tcpSocket:
              port: restate
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.notifications.resources | nindent 12 }}
{{- end }}
